name: Deploy Ludex Store to EC2

on:
  # This enables manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory on EC2
            # Make sure this path exists and matches your project folder name
            cd /home/${{ secrets.EC2_USER }}/ludex-store
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Optional: recreate the .env file from GitHub Secrets if you want to pass them directly
            # echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
            
            # Rebuild and restart the Docker container
            docker compose down
            docker compose build
            docker compose up -d
